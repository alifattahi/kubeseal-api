services:
  sealed-secret-api:
    build: .
    ports:
      - "8085:8080"
    environment:
      PORT: "8080"
      AUTH_USER: "admin"
      AUTH_PASS: "supersecret"            # Required — set a strong password
      CERT_FILE: "/certs/sealed-secrets.pem"
      CONTROLLER_NAMESPACE: "kube-system"
      CONTROLLER_NAME: "sealed-secrets-controller"
    volumes:
      - ./certs/sealed-secrets.pem:/certs/sealed-secrets.pem:ro
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
